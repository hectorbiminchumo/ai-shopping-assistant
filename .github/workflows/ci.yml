name: CI

on:
  pull_request:
    branches:
      - main

jobs:
  ci:
    name: Lint & Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build chatbot-core
        run: npx turbo build --filter=@dtc/chatbot-core

      - name: Run linter
        run: npm run lint

      - name: Run unit tests
        env:
          TEST_TYPE: unit
        run: npm run test
