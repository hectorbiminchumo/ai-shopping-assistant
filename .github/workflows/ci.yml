name: CI

on:
  pull_request:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Lint & Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Cache node_modules
        id: cache-node-modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            apps/*/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci --no-audit --no-fund

      - name: Cache turbo build outputs
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Build changed packages
        env:
          # Build verification only — deploys run on Vercel with real env.
          # The storefront builds without a live Medusa backend (build-time
          # fetches are try/caught), it just needs the env check to pass.
          # If the repo secret exists it is used; otherwise a dummy key.
          NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY || 'pk_ci_build_only' }}
        run: npx turbo build --filter=...[origin/main]

      - name: Run linter
        run: npx turbo lint --filter=...[origin/main]

      - name: Run unit tests
        env:
          TEST_TYPE: unit
        run: npx turbo test --filter=...[origin/main]
